name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Main Process
        run: npm run build:main

      - name: Run Tests
        run: npm test

      - name: Run i18n Audit
        run: npm run i18n:audit
        continue-on-error: true
